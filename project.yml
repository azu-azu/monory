name: monory
include:
  - local.yml
options:
  bundleIdPrefix: com.tsukiusagi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic

targets:
  monory:
    type: application
    platform: iOS
    sources:
      - monory
    info:
      path: monory/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tsukiusagi.monory
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "チケット画像をログに添付するため、フォトライブラリにアクセスします。"
        INFOPLIST_KEY_NSCameraUsageDescription: "チケット画像を撮影してログに添付します。"
        GENERATE_INFOPLIST_FILE: NO

schemes:
  monory:
    build:
      targets:
        monory: all
    run:
      config: Debug
    archive:
      config: Release
